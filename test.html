<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>测试页面</title>
</head>
<body>
<h1>测试页面</h1>
<button onclick="testClick()">点击测试</button>
<div id="result"></div>

<script>
function testClick() {
  document.getElementById('result').textContent = '点击成功！时间：' + new Date().toLocaleTimeString();
  console.log('点击测试成功');
}

// 测试各个模块是否加载
window.onload = function() {
  var result = '模块加载检查：\n';
  result += 'Storage: ' + (typeof Storage !== 'undefined' ? 'OK' : '未定义') + '\n';
  result += 'Chat: ' + (typeof Chat !== 'undefined' ? 'OK' : '未定义') + '\n';
  result += 'App: ' + (typeof App !== 'undefined' ? 'OK' : '未定义') + '\n';
  result += 'Trust: ' + (typeof Trust !== 'undefined' ? 'OK' : '未定义') + '\n';
  result += 'Evaluate: ' + (typeof Evaluate !== 'undefined' ? 'OK' : '未定义') + '\n';
  result += 'Recommend: ' + (typeof Recommend !== 'undefined' ? 'OK' : '未定义') + '\n';

  document.getElementById('result').innerText = result;
  console.log(result);
};
</script>

<script src="js/storage.js?v=3"></script>
<script src="js/trust.js?v=3"></script>
<script src="js/evaluate.js?v=3"></script>
<script src="js/recommend.js?v=3"></script>
<script src="js/chat.js?v=7"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
