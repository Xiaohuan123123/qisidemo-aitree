<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>详细测试</title>
</head>
<body>
<h1>详细模块测试</h1>
<div id="result" style="white-space: pre-wrap; font-family: monospace;"></div>

<script>
var results = [];
function log(msg) {
  results.push(msg);
  document.getElementById('result').innerText = results.join('\n');
  console.log(msg);
}

// 逐个加载测试
function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var script = document.createElement('script');
    script.src = src;
    script.onload = function() { resolve(); };
    script.onerror = function(e) { reject(new Error('Failed to load: ' + src)); };
    document.head.appendChild(script);
  });
}

async function test() {
  log('开始加载测试...');

  try {
    await loadScript('js/storage.js?v=99');
    log('✓ storage.js 加载成功');
    log('  Storage 类型: ' + typeof Storage);
  } catch(e) {
    log('✗ storage.js 失败: ' + e.message);
    return;
  }

  try {
    await loadScript('js/trust.js?v=99');
    log('✓ trust.js 加载成功');
    log('  Trust 类型: ' + typeof Trust);
  } catch(e) {
    log('✗ trust.js 失败: ' + e.message);
    return;
  }

  try {
    await loadScript('js/evaluate.js?v=99');
    log('✓ evaluate.js 加载成功');
    log('  Evaluate 类型: ' + typeof Evaluate);
  } catch(e) {
    log('✗ evaluate.js 失败: ' + e.message);
    return;
  }

  try {
    await loadScript('js/recommend.js?v=99');
    log('✓ recommend.js 加载成功');
    log('  Recommend 类型: ' + typeof Recommend);
  } catch(e) {
    log('✗ recommend.js 失败: ' + e.message);
    return;
  }

  try {
    await loadScript('js/chat.js?v=99');
    log('✓ chat.js 加载成功');
    log('  Chat 类型: ' + typeof Chat);
  } catch(e) {
    log('✗ chat.js 失败: ' + e.message);
    return;
  }

  try {
    await loadScript('js/app.js?v=99');
    log('✓ app.js 加载成功');
    log('  App 类型: ' + typeof App);
  } catch(e) {
    log('✗ app.js 失败: ' + e.message);
    return;
  }

  log('\n全部加载完成！');
}

// 捕获全局错误
window.onerror = function(msg, url, line, col, error) {
  log('!! 全局错误: ' + msg + ' (行' + line + ')');
  return false;
};

test();
</script>
</body>
</html>
